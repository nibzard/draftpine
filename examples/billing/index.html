<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Draftpine Billing Example</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <main class="container" x-data="billingExample()">
      <nav>
        <ul>
          <li><strong>Billing</strong></li>
        </ul>
        <ul>
          <li>
            <button data-draftpine-action="primary" data-draftpine-interaction="modal" @click="modalOpen = true">
              Upgrade plan
            </button>
          </li>
        </ul>
      </nav>

      <header class="page-header">
        <p class="eyebrow">Founder view</p>
        <h1>Usage billing dashboard</h1>
        <p>Review usage, invoices, and plan fit before upgrading.</p>
      </header>

      <section class="notice" data-draftpine-state="over-limit">
        <strong>Usage warning:</strong> You are close to the monthly limit.
      </section>

      <section class="grid" data-draftpine-state="default">
        <template x-for="metric in metrics" :key="metric.label">
          <article>
            <small x-text="metric.label"></small>
            <h2 x-text="metric.value"></h2>
            <p x-text="metric.note"></p>
          </article>
        </template>
      </section>

      <section class="segmented" data-draftpine-interaction="tabs">
        <button type="button" @click="tab = 'invoices'">Invoices</button>
        <button type="button" @click="tab = 'plans'">Plans</button>
      </section>

      <section x-show="tab === 'invoices'">
        <label data-draftpine-interaction="filter">
          Search invoices
          <input type="search" x-model="query" />
        </label>

        <section class="empty-state" data-draftpine-state="empty" x-show="filteredInvoices.length === 0">
          <h2>No invoices found</h2>
          <button type="button" @click="query = ''">Clear search</button>
        </section>

        <figure x-show="filteredInvoices.length > 0">
          <table>
            <thead>
              <tr>
                <th>Invoice</th>
                <th>Amount</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="invoice in filteredInvoices" :key="invoice.id">
                <tr>
                  <td x-text="invoice.id"></td>
                  <td x-text="invoice.amount"></td>
                  <td><mark x-text="invoice.status"></mark></td>
                </tr>
              </template>
            </tbody>
          </table>
        </figure>
      </section>

      <section x-show="tab === 'plans'">
        <div class="grid">
          <template x-for="plan in plans" :key="plan.name">
            <article>
              <strong x-text="plan.name"></strong>
              <p x-text="plan.price"></p>
              <button type="button" class="secondary" @click="modalOpen = true">Choose</button>
            </article>
          </template>
        </div>
      </section>

      <section class="success-state" data-draftpine-state="success" x-show="saved">
        Upgrade saved in the prototype.
      </section>

      <dialog data-draftpine-interaction="modal" :open="modalOpen">
        <article>
          <header>
            <button type="button" aria-label="Close upgrade modal" rel="prev" @click="modalOpen = false"></button>
            <strong>Upgrade plan</strong>
          </header>
          <form @submit.prevent="saved = true; modalOpen = false">
            <label>
              Plan
              <select>
                <option>Growth</option>
                <option>Scale</option>
              </select>
            </label>
            <footer>
              <button type="button" class="secondary" @click="modalOpen = false">Cancel</button>
              <button type="submit">Save mock upgrade</button>
            </footer>
          </form>
        </article>
      </dialog>
    </main>
  </body>
</html>
