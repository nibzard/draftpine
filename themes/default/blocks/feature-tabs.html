<section class="dp-section" data-block="feature-tabs">
  <div class="dp-container dp-stack">
    <div class="dp-section-heading">
      {{#eyebrow}}<span class="dp-badge">{{eyebrow}}</span>{{/eyebrow}}
      <h2>{{title}}</h2>
      {{#body}}<p>{{body}}</p>{{/body}}
    </div>
    <div class="dp-feature-tabs" x-data="draftpineTabs(0)" data-draftpine-interaction="tabs">
      <div class="dp-tab-list" role="tablist" aria-label="{{title}}">
        {{#tabs}}<button type="button" role="tab" :aria-selected="active === {{index}}" :class="{ 'is-active': active === {{index}} }" @click="setActive({{index}})">{{label}}</button>{{/tabs}}
      </div>
      <div class="dp-tab-panels">
        {{#tabs}}<article role="tabpanel" x-show="active === {{index}}" :data-draftpine-state="active === {{index}} ? 'active' : 'inactive'">
          <span>{{kicker}}</span>
          <h3>{{title}}</h3>
          <p>{{body}}</p>
        </article>{{/tabs}}
      </div>
    </div>
  </div>
</section>
