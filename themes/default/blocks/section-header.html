<section class="dp-section dp-section-compact" data-block="section-header">
  <div class="dp-container">
    <div class="dp-section-heading">
      {{#eyebrow}}<span class="dp-badge">{{eyebrow}}</span>{{/eyebrow}}
      <h2>{{title}}</h2>
      {{#body}}<p>{{body}}</p>{{/body}}
      {{#href}}<a href="{{href}}" class="dp-inline-action">{{action}}</a>{{/href}}
    </div>
  </div>
</section>
