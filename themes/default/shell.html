<!doctype html>
<html lang="en" x-data="{...createDraftpineShell({depth:{{depth}},defaultMode:'{{theme.defaultMode}}'})}" x-init="init()">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>{{page.title}} · {{project.name}}</title>
    <meta name="description" content="{{page.description}}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <script>{{{themeInit}}}</script>
    <link rel="stylesheet" href="{{picoHref}}" />
    <link rel="stylesheet" href="{{styleHref}}" />
  </head>
  <body class="dp-route" data-route="{{page.id}}" data-route-type="{{page.type}}">
    <header class="dp-site-header">
      <nav class="dp-container">
        <ul><li><strong><span class="dp-brand-mark">DP</span><span class="dp-brand-name">{{project.name}}</span></strong></li></ul>
        <ul class="dp-site-nav-links" data-draftpine-overflow="allowed">
          {{#nav}}<li><a href="{{href}}"{{#active}} aria-current="page"{{/active}}>{{label}}</a></li>{{/nav}}
          <li>{{{themeToggle}}}</li>
        </ul>
      </nav>
    </header>
    <main class="dp-main">
      <div class="dp-page-frame">
{{{sections}}}
      </div>
    </main>
    <footer class="dp-site-footer">
      <div class="dp-container dp-footer-inner">
        <nav aria-label="Footer">
          <ul>{{#footer}}<li><a href="{{href}}">{{label}}</a></li>{{/footer}}</ul>
        </nav>
        <p>Generated by Draftpine.</p>
      </div>
    </footer>
    <script src="{{runtimeHref}}"></script>
    <script defer src="{{alpineHref}}"></script>
  </body>
</html>
