<section class="dp-section dp-state-panel" data-primitive="core.statePanel" data-variant="{{variant}}">
  <div class="dp-container dp-panel dp-stack" data-draftpine-state="{{state}}">
    <h2>{{title}}</h2>
    {{#if description}}<p>{{description}}</p>{{/if}}
    {{#if action.label}}<a role="button" href="{{action.href}}">{{action.label}}</a>{{/if}}
  </div>
</section>
