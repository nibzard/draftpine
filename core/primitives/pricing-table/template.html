<section class="dp-section dp-pricing-table" data-primitive="core.pricingTable" data-variant="{{variant}}">
  <div class="dp-container dp-stack">
    {{#if title}}<header><h2>{{title}}</h2>{{#if description}}<p>{{description}}</p>{{/if}}</header>{{/if}}
    <div class="dp-grid-auto">
      {{#each items}}<article class="dp-panel dp-price-card">
        <h3>{{name}}</h3>
        <p class="dp-price">{{price}}</p>
        <p>{{description}}</p>
        <ul>{{#each features}}<li>{{value}}</li>{{/each}}</ul>
        <a role="button" data-draftpine-action="primary" href="{{action.href}}">{{action.label}}</a>
      </article>{{/each}}
    </div>
  </div>
</section>
