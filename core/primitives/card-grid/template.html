<section class="dp-section dp-card-grid-primitive" data-primitive="core.cardGrid" data-variant="{{variant}}">
  <div class="dp-container dp-stack">
    {{#if title}}<header class="dp-stack"><h2>{{title}}</h2>{{#if description}}<p>{{description}}</p>{{/if}}</header>{{/if}}
    <div class="dp-grid-auto">
      {{#each items}}<article class="dp-panel">
        <h3>{{title}}</h3>
        <p>{{body}}</p>
        {{#if href}}<a href="{{href}}">{{linkLabel}}</a>{{/if}}
      </article>{{/each}}
    </div>
  </div>
</section>
