<section class="dp-section dp-support-panel" data-primitive="core.supportPanel" data-variant="{{variant}}">
  <div class="dp-container dp-support-layout">
    <div class="dp-stack">
      <h2>{{title}}</h2>
      {{#if description}}<p>{{description}}</p>{{/if}}
      <div class="dp-support-options">
        {{#each options}}<article><strong>{{title}}</strong><p>{{body}}</p><a href="{{href}}">{{label}}</a></article>{{/each}}
      </div>
    </div>
    <aside class="dp-support-status">
      {{#each status}}<div><span>{{label}}</span><strong>{{value}}</strong></div>{{/each}}
    </aside>
  </div>
</section>
