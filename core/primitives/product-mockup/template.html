<section class="dp-section dp-product-mockup" data-primitive="core.productMockup" data-variant="{{variant}}">
  <div class="dp-container dp-stack">
    <header class="dp-stack">
      <h2>{{title}}</h2>
      {{#if description}}<p>{{description}}</p>{{/if}}
    </header>
    <article class="dp-product-shell">
      {{#if toolbar}}<div class="dp-product-toolbar">{{#each toolbar}}<span>{{label}}</span>{{/each}}</div>{{/if}}
      <div class="dp-product-grid">
        {{#each panels}}<div class="dp-product-panel">
          <strong>{{title}}</strong>
          <p>{{body}}</p>
          {{#if meta}}<small>{{meta}}</small>{{/if}}
        </div>{{/each}}
      </div>
      {{#if activity}}<div class="dp-product-activity">{{#each activity}}<span><b>{{time}}</b>{{label}}</span>{{/each}}</div>{{/if}}
    </article>
  </div>
</section>
