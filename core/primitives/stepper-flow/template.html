<section class="dp-section dp-stepper-flow" data-primitive="core.stepperFlow" data-variant="{{variant}}">
  <div class="dp-container dp-stepper-shell">
    <div class="dp-stack">
      <h2>{{title}}</h2>
      {{#if description}}<p>{{description}}</p>{{/if}}
      <ol class="dp-step-list">
        {{#each steps}}<li><div><strong>{{title}}</strong><span>{{body}}</span></div></li>{{/each}}
      </ol>
      <div class="dp-actions">
        <a role="button" data-draftpine-action="primary" href="{{primaryAction.href}}">{{primaryAction.label}}</a>
      </div>
    </div>
    <aside class="dp-step-summary">
      <strong>{{summary.title}}</strong>
      <p>{{summary.body}}</p>
      {{#if summary.meta}}<small>{{summary.meta}}</small>{{/if}}
    </aside>
  </div>
</section>
