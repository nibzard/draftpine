<section class="dp-section dp-data-table" data-primitive="core.dataTable" data-variant="{{variant}}">
  <div class="dp-container dp-stack">
    <header class="dp-stack">
      <h2>{{title}}</h2>
      {{#if description}}<p>{{description}}</p>{{/if}}
    </header>
    <div class="dp-table-shell dp-scroll-x" data-draftpine-overflow="allowed">
      <table>
        <thead><tr>{{#each columns}}<th>{{label}}</th>{{/each}}</tr></thead>
        <tbody>
          {{#each rows}}<tr><th>{{label}}</th><td>{{status}}</td><td>{{owner}}</td><td>{{updated}}</td></tr>{{/each}}
        </tbody>
      </table>
    </div>
  </div>
</section>
