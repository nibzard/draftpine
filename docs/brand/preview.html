<!-- ABOUTME: Local preview for the Draftpine mark — static + animated, on the dark tile. -->
<!-- ABOUTME: Open in a browser to watch the print-glitch reveal loop. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Draftpine mark — preview</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center;
           background: #16140F; color: #ECE3CE; font: 14px/1.4 ui-monospace, Menlo, monospace; }
    .row { display: flex; gap: 56px; align-items: center; flex-wrap: wrap; justify-content: center; padding: 40px; }
    figure { margin: 0; text-align: center; }
    img { width: 200px; height: 200px; display: block; }
    figcaption { margin-top: 14px; letter-spacing: 2px; text-transform: uppercase; opacity: .8; }
    .sizes { display: flex; gap: 20px; align-items: flex-end; margin-top: 8px; }
    .sizes img:nth-child(1){ width: 128px; height: 128px; }
    .sizes img:nth-child(2){ width: 64px;  height: 64px; }
    .sizes img:nth-child(3){ width: 32px;  height: 32px; }
    .sizes img:nth-child(4){ width: 16px;  height: 16px; }
  </style>
</head>
<body>
  <div class="row">
    <figure>
      <img src="draftpine-mark-animated.svg" alt="animated mark">
      <figcaption>animated · loops every 5.5s</figcaption>
    </figure>
    <figure>
      <img src="draftpine-mark.svg" alt="static mark">
      <figcaption>static</figcaption>
    </figure>
    <figure>
      <div class="sizes">
        <img src="draftpine-mark.svg" alt=""><img src="draftpine-mark.svg" alt="">
        <img src="draftpine-mark.svg" alt=""><img src="draftpine-mark.svg" alt="">
      </div>
      <figcaption>128 / 64 / 32 / 16 px</figcaption>
    </figure>
  </div>
</body>
</html>
