<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- ABOUTME: Draftpine mark — narrow pointy pine of half + full hatched blocks over a trunk. -->
  <!-- ABOUTME: Flat cream surface, hard corners, clashing orange/teal, ink hatch. No gradients. -->
  <defs>
    <pattern id="p_dots"  width="8"  height="8"  patternUnits="userSpaceOnUse"><circle cx="4" cy="4" r="1.7" fill="#16140F"/></pattern>
    <pattern id="p_diag"  width="8"  height="8"  patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="2.6" height="8" fill="#16140F"/></pattern>
    <pattern id="p_vline" width="8"  height="8"  patternUnits="userSpaceOnUse"><rect width="2.6" height="8" fill="#16140F"/></pattern>
    <pattern id="p_grid"  width="9"  height="9"  patternUnits="userSpaceOnUse"><rect width="1.8" height="9" fill="#16140F"/><rect width="9" height="1.8" fill="#16140F"/></pattern>
    <pattern id="p_check" width="8"  height="8"  patternUnits="userSpaceOnUse"><rect width="4" height="4" fill="#16140F"/><rect x="4" y="4" width="4" height="4" fill="#16140F"/></pattern>
  </defs>

  <rect width="256" height="256" fill="#ECE3CE"/>

  <g stroke="#16140F" stroke-width="2">
    <!-- trunk (steady anchor) -->
    <g><rect x="121" y="161" width="14" height="26" fill="#DC5B27" stroke="none"/><rect x="121" y="161" width="14" height="26" fill="url(#p_vline)" stroke="none"/><rect x="121" y="161" width="14" height="26" fill="none"/></g>

    <!-- tip (small square = the point) -->
    <g><rect x="119" y="44" width="18" height="18" fill="#DC5B27" stroke="none"/><rect x="119" y="44" width="18" height="18" fill="url(#p_dots)" stroke="none"/><rect x="119" y="44" width="18" height="18" fill="none"/></g>

    <!-- level A: 1 full -->
    <g><rect x="114" y="66" width="28" height="28" fill="#1C8C7C" stroke="none"/><rect x="114" y="66" width="28" height="28" fill="url(#p_diag)" stroke="none"/><rect x="114" y="66" width="28" height="28" fill="none"/></g>

    <!-- level B: half | full | half -->
    <g><rect x="96"  y="98" width="14" height="28" fill="#DC5B27" stroke="none"/><rect x="96"  y="98" width="14" height="28" fill="url(#p_vline)" stroke="none"/><rect x="96"  y="98" width="14" height="28" fill="none"/></g>
    <g><rect x="114" y="98" width="28" height="28" fill="#1C8C7C" stroke="none"/><rect x="114" y="98" width="28" height="28" fill="url(#p_dots)"  stroke="none"/><rect x="114" y="98" width="28" height="28" fill="none"/></g>
    <g><rect x="146" y="98" width="14" height="28" fill="#DC5B27" stroke="none"/><rect x="146" y="98" width="14" height="28" fill="url(#p_check)" stroke="none"/><rect x="146" y="98" width="14" height="28" fill="none"/></g>

    <!-- level C (base): half | full | full | half -->
    <g><rect x="80"  y="130" width="14" height="28" fill="#1C8C7C" stroke="none"/><rect x="80"  y="130" width="14" height="28" fill="url(#p_check)" stroke="none"/><rect x="80"  y="130" width="14" height="28" fill="none"/></g>
    <g><rect x="98"  y="130" width="28" height="28" fill="#DC5B27" stroke="none"/><rect x="98"  y="130" width="28" height="28" fill="url(#p_dots)"  stroke="none"/><rect x="98"  y="130" width="28" height="28" fill="none"/></g>
    <g><rect x="130" y="130" width="28" height="28" fill="#1C8C7C" stroke="none"/><rect x="130" y="130" width="28" height="28" fill="url(#p_grid)"  stroke="none"/><rect x="130" y="130" width="28" height="28" fill="none"/></g>
    <g><rect x="162" y="130" width="14" height="28" fill="#DC5B27" stroke="none"/><rect x="162" y="130" width="14" height="28" fill="url(#p_dots)"  stroke="none"/><rect x="162" y="130" width="14" height="28" fill="none"/></g>
  </g>
</svg>
