<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Draftpine - Usage Billing Wireframe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <main class="container" x-data="billingWireframe()">
      <nav aria-label="Primary">
        <ul>
          <li><strong x-text="content.brand"></strong></li>
        </ul>
        <ul>
          <li><a href="#usage" @click.prevent="tab = 'usage'" :aria-current="tab === 'usage' ? 'page' : null" x-text="content.nav.usage"></a></li>
          <li><a href="#invoices" @click.prevent="tab = 'invoices'" :aria-current="tab === 'invoices' ? 'page' : null" x-text="content.nav.invoices"></a></li>
          <li><a href="#plans" @click.prevent="tab = 'plans'" :aria-current="tab === 'plans' ? 'page' : null" x-text="content.nav.plans"></a></li>
        </ul>
      </nav>

      <header class="page-header">
        <div>
          <p class="eyebrow" x-text="content.header.eyebrow"></p>
          <h1 x-text="content.header.title"></h1>
          <p x-text="content.header.description"></p>
        </div>
        <button aria-label="Upgrade plan" data-draftpine-action="primary" data-draftpine-interaction="modal" @click="openUpgrade()" x-text="content.primaryAction"></button>
      </header>

      <section class="notice" data-draftpine-state="over-limit" x-show="usagePercent >= 90">
        <strong x-text="content.notice.title"></strong>
        <span><span x-text="content.notice.prefix"></span> <span x-text="usagePercent"></span>% <span x-text="content.notice.description"></span></span>
      </section>

      <section class="grid summary-grid" aria-label="Usage summary">
        <article>
          <small x-text="content.metrics[0].label"></small>
          <h2 x-text="metrics.runs"></h2>
          <progress max="100" :value="usagePercent"></progress>
        </article>
        <article>
          <small x-text="content.metrics[1].label"></small>
          <h2 x-text="metrics.projectedBill"></h2>
          <p x-text="content.metrics[1].note"></p>
        </article>
        <article>
          <small x-text="content.metrics[2].label"></small>
          <h2 x-text="metrics.nextInvoice"></h2>
          <p x-text="content.metrics[2].note"></p>
        </article>
      </section>

      <section data-draftpine-interaction="tabs">
        <div class="segmented" role="tablist" aria-label="Billing sections">
          <button type="button" aria-label="Show usage" @click="tab = 'usage'" :aria-selected="tab === 'usage'" x-text="content.tabs.usage"></button>
          <button type="button" aria-label="Show invoices" @click="tab = 'invoices'" :aria-selected="tab === 'invoices'" x-text="content.tabs.invoices"></button>
          <button type="button" aria-label="Show plans" @click="tab = 'plans'" :aria-selected="tab === 'plans'" x-text="content.tabs.plans"></button>
        </div>

        <section id="usage" x-show="tab === 'usage'" data-draftpine-state="default">
          <div class="section-heading">
            <div>
              <h2 x-text="content.sections.usage.title"></h2>
              <p x-text="content.sections.usage.description"></p>
            </div>
          </div>
          <div class="chart-placeholder" aria-label="Usage chart placeholder">
            <template x-for="bar in usageBars" :key="bar.label">
              <div>
                <span :style="`height: ${bar.value}%`"></span>
                <small x-text="bar.label"></small>
              </div>
            </template>
          </div>
        </section>

        <section id="invoices" x-show="tab === 'invoices'">
          <div class="section-heading">
            <div>
              <h2 x-text="content.sections.invoices.title"></h2>
              <p x-text="content.sections.invoices.description"></p>
            </div>
            <label data-draftpine-interaction="filter">
              <span x-text="content.sections.invoices.searchLabel"></span>
              <input type="search" :placeholder="content.sections.invoices.searchPlaceholder" x-model="invoiceQuery" />
            </label>
          </div>

          <section class="empty-state" data-draftpine-state="empty" x-show="filteredInvoices.length === 0">
            <h3 x-text="content.emptyState.title"></h3>
            <p x-text="content.emptyState.description"></p>
            <button type="button" aria-label="Clear invoice search" class="secondary" @click="invoiceQuery = ''" x-text="content.emptyState.action"></button>
          </section>

          <figure x-show="filteredInvoices.length > 0">
            <table>
              <thead>
                <tr>
                  <th x-text="content.table.invoice"></th>
                  <th x-text="content.table.date"></th>
                  <th x-text="content.table.amount"></th>
                  <th x-text="content.table.status"></th>
                </tr>
              </thead>
              <tbody>
                <template x-for="invoice in filteredInvoices" :key="invoice.id">
                  <tr>
                    <td x-text="invoice.id"></td>
                    <td x-text="invoice.date"></td>
                    <td x-text="invoice.amount"></td>
                    <td><mark x-text="invoice.status"></mark></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </figure>
        </section>

        <section id="plans" x-show="tab === 'plans'">
          <div class="section-heading">
            <div>
              <h2 x-text="content.sections.plans.title"></h2>
              <p x-text="content.sections.plans.description"></p>
            </div>
          </div>
          <div class="grid plan-grid">
            <template x-for="plan in plans" :key="plan.name">
              <article>
                <header>
                  <strong x-text="plan.name"></strong>
                  <span x-text="plan.price"></span>
                </header>
                <p x-text="plan.description"></p>
                <button type="button" aria-label="Choose plan" class="secondary" @click="openUpgrade(plan)"><span x-text="content.actions.choose"></span> <span x-text="plan.name"></span></button>
              </article>
            </template>
          </div>
        </section>
      </section>

      <section class="success-state" data-draftpine-state="success" x-show="upgradeSaved">
        <strong x-text="content.successState.title"></strong>
        <span x-text="content.successState.description"></span>
      </section>

      <dialog data-draftpine-interaction="modal" :open="modalOpen">
        <article>
          <header>
            <button type="button" aria-label="Close upgrade modal" rel="prev" @click="modalOpen = false"></button>
            <strong x-text="content.modal.title"></strong>
          </header>
          <form @submit.prevent="saveUpgrade()">
            <label>
              <span x-text="content.modal.selectedPlanLabel"></span>
              <select x-model="selectedPlan">
                <template x-for="plan in plans" :key="plan.name">
                  <option :value="plan.name" x-text="plan.name"></option>
                </template>
              </select>
            </label>
            <label>
              <span x-text="content.modal.billingNoteLabel"></span>
              <textarea x-model="billingNote" :placeholder="content.modal.billingNotePlaceholder"></textarea>
            </label>
            <footer>
              <button type="button" aria-label="Cancel upgrade" class="secondary" @click="modalOpen = false" x-text="content.modal.cancel"></button>
              <button type="submit" aria-label="Save mock upgrade" x-text="content.modal.submit"></button>
            </footer>
          </form>
        </article>
      </dialog>
    </main>
  </body>
</html>
