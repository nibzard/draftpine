<section class="dp-section" data-block="press-logos">
  <div class="dp-container dp-stack">
    <div class="dp-section-heading">
      <h2>{{title}}</h2>
      {{#body}}<p>{{body}}</p>{{/body}}
    </div>
    <ul class="dp-press-logos">
      {{#items}}<li><span>{{source}}</span><strong>{{quote}}</strong></li>{{/items}}
    </ul>
  </div>
</section>
