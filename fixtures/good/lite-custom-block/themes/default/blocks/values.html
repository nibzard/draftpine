<section class="dp-section" data-block="values">
  <div class="dp-container dp-stack">
    <div class="dp-section-heading">
      <h2>{{title}}</h2>
      {{#body}}<p>{{body}}</p>{{/body}}
    </div>
    <div class="dp-values-grid">
      {{#items}}<article>
        <span>{{number}}</span>
        <h3>{{title}}</h3>
        <p>{{body}}</p>
      </article>{{/items}}
    </div>
  </div>
</section>
