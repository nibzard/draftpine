<section class="dp-section" data-block="logo-cloud">
  <div class="dp-container dp-stack">
    {{#title}}<h2>{{title}}</h2>{{/title}}
    {{#body}}<p class="dp-section-intro">{{body}}</p>{{/body}}
    <ul class="dp-logo-grid">
      {{#logos}}<li>
        <span class="dp-logo-mark">{{mark}}</span>
        <strong>{{name}}</strong>
      </li>{{/logos}}
    </ul>
  </div>
</section>
