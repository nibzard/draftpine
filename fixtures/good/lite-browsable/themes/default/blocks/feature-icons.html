<section class="dp-section" data-block="feature-icons">
  <div class="dp-container dp-stack">
    {{#eyebrow}}<span class="dp-badge">{{eyebrow}}</span>{{/eyebrow}}
    <div class="dp-section-heading">
      <h2>{{title}}</h2>
      {{#body}}<p>{{body}}</p>{{/body}}
    </div>
    <div class="dp-feature-icons">
      {{#items}}<article class="dp-feature-icon">
        <span class="dp-feature-mark">{{icon}}</span>
        <h3>{{title}}</h3>
        <p>{{body}}</p>
      </article>{{/items}}
    </div>
  </div>
</section>
