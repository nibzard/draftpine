<section class="dp-section" data-block="testimonial">
  <div class="dp-container">
    <figure class="dp-testimonial">
      <blockquote>{{quote}}</blockquote>
      <figcaption>
        <span class="dp-avatar">{{initials}}</span>
        <span>
          <strong>{{author}}</strong>
          <small>{{role}}</small>
        </span>
      </figcaption>
    </figure>
  </div>
</section>
