<section class="dp-section" data-block="newsletter">
  <div class="dp-container">
    <div class="dp-newsletter">
      <div class="dp-stack">
        <h2>{{title}}</h2>
        {{#body}}<p>{{body}}</p>{{/body}}
      </div>
      <form class="dp-newsletter-form">
        <label>
          <span class="dp-sr-only">Email</span>
          <input type="email" name="email" placeholder="{{placeholder}}" />
        </label>
        <button type="button" data-draftpine-action="primary">{{action}}</button>
      </form>
    </div>
  </div>
</section>
