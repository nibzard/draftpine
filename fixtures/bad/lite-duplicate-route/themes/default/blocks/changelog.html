<section class="dp-section" data-block="changelog">
  <div class="dp-container dp-stack">
    <div class="dp-section-heading">
      <h2>{{title}}</h2>
      {{#body}}<p>{{body}}</p>{{/body}}
    </div>
    <ol class="dp-changelog">
      {{#items}}<li>
        <time>{{date}}</time>
        <div><h3>{{title}}</h3><p>{{body}}</p></div>
      </li>{{/items}}
    </ol>
  </div>
</section>
