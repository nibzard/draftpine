<section class="dp-section" data-block="cta-split">
  <div class="dp-container">
    <div class="dp-cta-split">
      <div>
        <h2>{{title}}</h2>
        {{#body}}<p>{{body}}</p>{{/body}}
      </div>
      <div class="dp-actions">
        {{#primaryAction}}<a href="{{primaryHref}}" role="button" data-draftpine-action="primary">{{primaryAction}}</a>{{/primaryAction}}
        {{#secondaryAction}}<a href="{{secondaryHref}}" role="button" class="secondary">{{secondaryAction}}</a>{{/secondaryAction}}
      </div>
    </div>
  </div>
</section>
