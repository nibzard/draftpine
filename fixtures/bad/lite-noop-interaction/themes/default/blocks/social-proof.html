<section class="dp-section" data-block="social-proof">
  <div class="dp-container">
    <div class="dp-social-proof">
      <div>
        {{#eyebrow}}<span class="dp-badge">{{eyebrow}}</span>{{/eyebrow}}
        <h2>{{title}}</h2>
        {{#body}}<p>{{body}}</p>{{/body}}
      </div>
      <ul class="dp-proof-stats">
        {{#stats}}<li>
          <strong>{{value}}</strong>
          <span>{{label}}</span>
        </li>{{/stats}}
      </ul>
    </div>
  </div>
</section>
