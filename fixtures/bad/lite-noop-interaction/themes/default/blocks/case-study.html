<section class="dp-section" data-block="case-study">
  <div class="dp-container">
    <article class="dp-case-study">
      <div class="dp-stack">
        {{#eyebrow}}<span class="dp-badge">{{eyebrow}}</span>{{/eyebrow}}
        <h2>{{title}}</h2>
        {{#body}}<p>{{body}}</p>{{/body}}
        {{#href}}<a href="{{href}}" class="dp-inline-action">{{action}}</a>{{/href}}
      </div>
      <dl>
        {{#stats}}<div><dt>{{label}}</dt><dd>{{value}}</dd></div>{{/stats}}
      </dl>
    </article>
  </div>
</section>
