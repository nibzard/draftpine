<section class="dp-section" data-block="case-study-grid">
  <div class="dp-container dp-stack">
    <div class="dp-section-heading">
      <h2>{{title}}</h2>
      {{#body}}<p>{{body}}</p>{{/body}}
    </div>
    <div class="dp-case-grid">
      {{#items}}<article>
        <span>{{company}}</span>
        <h3>{{title}}</h3>
        <p>{{body}}</p>
        <strong>{{result}}</strong>
      </article>{{/items}}
    </div>
  </div>
</section>
