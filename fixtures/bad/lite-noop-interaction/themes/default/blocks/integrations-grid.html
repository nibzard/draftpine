<section class="dp-section" data-block="integrations-grid">
  <div class="dp-container dp-stack">
    <div class="dp-section-heading">
      <h2>{{title}}</h2>
      {{#body}}<p>{{body}}</p>{{/body}}
    </div>
    <div class="dp-integrations-grid">
      {{#items}}<article>
        <span class="dp-logo-mark">{{mark}}</span>
        <h3>{{name}}</h3>
        <p>{{body}}</p>
      </article>{{/items}}
    </div>
  </div>
</section>
