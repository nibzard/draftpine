<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Draftpine Onboarding Template</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <main class="container" x-data="onboardingTemplate()">
      <nav>
        <ul>
          <li><strong>Setup</strong></li>
        </ul>
        <ul>
          <li>
            <button data-draftpine-action="primary" data-draftpine-interaction="modal" @click="modalOpen = true">
              Invite teammate
            </button>
          </li>
        </ul>
      </nav>

      <header class="page-header">
        <p class="eyebrow">New admin</p>
        <h1>Workspace onboarding</h1>
        <p>Complete the setup checklist and invite the first teammate.</p>
        <progress max="100" :value="progress"></progress>
      </header>

      <section class="layout" data-draftpine-state="default">
        <div>
          <template x-for="task in tasks" :key="task.label">
            <article>
              <label>
                <input type="checkbox" x-model="task.done" data-draftpine-interaction="toggle" />
                <span x-text="task.label"></span>
              </label>
              <p x-text="task.description"></p>
            </article>
          </template>
        </div>
        <aside>
          <h2 x-text="`${progress}% complete`"></h2>
          <p>Progress updates as checklist items are toggled.</p>
        </aside>
      </section>

      <section class="empty-state" data-draftpine-state="empty" x-show="teammates.length === 0">
        <h2>No teammates yet</h2>
        <p>Invite someone to finish collaborative setup.</p>
      </section>

      <section class="success-state" data-draftpine-state="success" x-show="invited">
        Invite sent in the prototype.
      </section>

      <dialog data-draftpine-interaction="modal" :open="modalOpen">
        <article>
          <header>
            <button type="button" aria-label="Close invite modal" rel="prev" @click="modalOpen = false"></button>
            <strong>Invite teammate</strong>
          </header>
          <form @submit.prevent="invited = true; modalOpen = false">
            <label>
              Email
              <input type="email" placeholder="teammate@example.com" />
            </label>
            <footer>
              <button type="button" class="secondary" @click="modalOpen = false">Cancel</button>
              <button type="submit">Send mock invite</button>
            </footer>
          </form>
        </article>
      </dialog>
    </main>
  </body>
</html>
